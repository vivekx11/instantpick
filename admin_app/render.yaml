services:
  - type: web
    name: admin-dashboard
    env: static
    buildCommand: |
      flutter pub get
      flutter build web --release
    staticPublishPath: build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: max-age=31536000
